<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My LIFF App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>testtesttest</h1>
  <p id="name"></p>

  <script>
const liffId = "2009609373-YZ6ak3ym";
 
    liff.init({ liffId: liffId })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
 
        return liff.getProfile();
      })
      .then(profile => {
        const lineUserId = profile.userId;
 
        const surveyUrl =
          "https://survey.zohopublic.com/zs/FABhIP"
          + "?line_user_id=" + encodeURIComponent(lineUserId);
 
        window.location.href = surveyUrl;
      })
      .catch(err => {
        console.error(err);
      });
  </script>
</body>
</html>
